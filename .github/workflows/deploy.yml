name: Build and deploy WASM

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate the atlas
        run: |
          clang++ -D_CRT_SECURE_NO_WARNINGS -Wno-writable-strings atlas_builder.cpp -o atlas_builder
          ./atlas_builder

      - name: Compile WASM
        run: |
          clang -mbulk-memory -Wno-writable-strings -DWASM_BUILD=1 -DGAME_SLOW=0 -DGAME_INTERNAL=0 --target=wasm32 -std=c++11 -nostdlib -O3 -Wl,--no-entry,--export=GameUpdateAndRender,--export=__heap_base,--import-memory -o game.wasm game.cpp

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' 

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
